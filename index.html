    <script>
        // ============================================
        // 🔥 FIREBASE CONFIGURATION
        // REPLACE THIS WITH YOUR FIREBASE CONFIG
        // ============================================
        const firebaseConfig = {
  apiKey: "AIzaSyAFHRCadWPB0O-ucYg8OFLato0pfuJfxSU",
  authDomain: "tug-game.firebaseapp.com",
  databaseURL: "https://tug-game-default-rtdb.firebaseio.com",
  projectId: "tug-game",
  storageBucket: "tug-game.firebasestorage.app",
  messagingSenderId: "431145733371",
  appId: "1:431145733371:web:d3a00ea82b75393d57b45e"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================
        // SAMPLE QUESTIONS (20+)
        // ============================================
        const SAMPLE_QUESTIONS = [
            { q: "What is the capital of France?", options: ["Paris", "London", "Berlin", "Madrid"], correct: 0 },
            { q: "Which planet is known as the Red Planet?", options: ["Venus", "Mars", "Jupiter", "Saturn"], correct: 1 },
            { q: "What is 7 × 8?", options: ["48", "56", "64", "72"], correct: 1 },
            { q: "Who painted the Mona Lisa?", options: ["Michelangelo", "Leonardo da Vinci", "Raphael", "Donatello"], correct: 1 },
            { q: "What is the smallest prime number?", options: ["0", "1", "2", "3"], correct: 2 },
            { q: "Which ocean is the largest?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 },
            { q: "What is the chemical symbol for water?", options: ["H2O", "CO2", "NaCl", "HCl"], correct: 0 },
            { q: "Who wrote 'Hamlet'?", options: ["Shakespeare", "Dickens", "Hemingway", "Tolkien"], correct: 0 },
            { q: "What is the speed of light approx? (km/s)", options: ["300,000", "150,000", "500,000", "1,000,000"], correct: 0 },
            { q: "Which country has the most people?", options: ["India", "China", "USA", "Indonesia"], correct: 0 },
            { q: "What is the freezing point of water in Celsius?", options: ["0", "32", "100", "-1"], correct: 0 },
            { q: "Which animal is the fastest on land?", options: ["Lion", "Cheetah", "Horse", "Gazelle"], correct: 1 },
            { q: "What is the square root of 144?", options: ["10", "11", "12", "13"], correct: 2 },
            { q: "Which gas do plants absorb?", options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], correct: 2 },
            { q: "What is the longest river in the world?", options: ["Nile", "Amazon", "Yangtze", "Mississippi"], correct: 0 },
            { q: "How many continents are there?", options: ["5", "6", "7", "8"], correct: 2 },
            { q: "Which element has the symbol 'Au'?", options: ["Silver", "Gold", "Iron", "Copper"], correct: 1 },
            { q: "What year did WWII end?", options: ["1944", "1945", "1946", "1947"], correct: 1 },
            { q: "Which is the smallest country?", options: ["Monaco", "Vatican", "San Marino", "Liechtenstein"], correct: 1 },
            { q: "What is the main ingredient in guacamole?", options: ["Tomato", "Avocado", "Onion", "Pepper"], correct: 1 },
            { q: "How many teeth does an adult human have?", options: ["28", "30", "32", "34"], correct: 2 },
            { q: "Which blood type is the rarest?", options: ["AB negative", "A positive", "B negative", "O positive"], correct: 0 },
        ];

        // ============================================
        // GAME STATE
        // ============================================
        const state = {
            role: null, // 'red', 'blue', or 'viewer'
            questions: [],
            scoreRed: 0,
            scoreBlue: 0,
            tugProgress: 50, // 0 = Red wins, 100 = Blue wins
            red_questionIdx: 0,
            blue_questionIdx: 0,
            answering: false,
            gameStarted: false,
            connected: false,
            listeners: {},
            isJoining: false,
            isViewer: false
        };

        // ============================================
        // DOM REFS
        // ============================================
        const $ = id => document.getElementById(id);
        const redBtn = $('redBtn');
        const blueBtn = $('blueBtn');
        const viewerBtn = $('viewerBtn');
        const gameArea = $('gameArea');
        const redName = $('redName');
        const blueName = $('blueName');
        const scoreRed = $('scoreRed');
        const scoreBlue = $('scoreBlue');
        const tugCanvas = $('tugCanvas');
        const ctx = tugCanvas.getContext('2d');
        const questionDisplay = $('questionDisplay');
        const optionsContainer = $('optionsContainer');
        const statusMsg = $('statusMsg');
        const nextQuestionBtn = $('nextQuestionBtn');
        const playerDisplay = $('playerDisplay');
        const onlineStatus = $('onlineStatus');
        const loadingOverlay = $('loadingOverlay');
        const forceResetBtn = $('forceResetBtn');
        const leaveBtn = $('leaveBtn');
        const viewerCount = $('viewerCount');

        // ============================================
        // CANVAS DRAWING - TEAM CHARACTERS PULLING
        // ============================================
        function drawTug(progress) {
            const w = tugCanvas.width, h = tugCanvas.height;
            ctx.clearRect(0, 0, w, h);

            // Ground
            const groundGrad = ctx.createLinearGradient(0, h-30, 0, h);
            groundGrad.addColorStop(0, '#2a4a3a');
            groundGrad.addColorStop(1, '#1a2a1a');
            ctx.fillStyle = groundGrad;
            ctx.fillRect(0, h-30, w, 30);

            // Sky gradient
            const skyGrad = ctx.createLinearGradient(0, 0, 0, h-30);
            skyGrad.addColorStop(0, '#1a2a4a');
            skyGrad.addColorStop(0.5, '#2a4a6a');
            skyGrad.addColorStop(1, '#3a5a7a');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, w, h-30);

            // Stars
            ctx.fillStyle = '#ffffff44';
            for (let i = 0; i < 30; i++) {
                const x = (i * 37 + 13) % w;
                const y = (i * 23 + 7) % (h-40);
                ctx.beginPath();
                ctx.arc(x, y, 1 + (i % 2), 0, Math.PI * 2);
                ctx.fill();
            }

            // Ground line
            ctx.strokeStyle = '#4a6a4a';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(0, h-30);
            ctx.lineTo(w, h-30);
            ctx.stroke();

            // Rope - main body
            const ropeX = 10 + (progress / 100) * (w - 20 - 80);
            const ropeWidth = 80;
            
            // Rope shadow
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 10;
            ctx.shadowBlur = 0;
            
            // Rope texture
            const ropeGrad = ctx.createLinearGradient(ropeX, 0, ropeX + ropeWidth, 0);
            ropeGrad.addColorStop(0, '#6a5a3a');
            ropeGrad.addColorStop(0.2, '#b8a88a');
            ropeGrad.addColorStop(0.5, '#d4c4a4');
            ropeGrad.addColorStop(0.8, '#b8a88a');
            ropeGrad.addColorStop(1, '#6a5a3a');
            ctx.fillStyle = ropeGrad;
            ctx.beginPath();
            ctx.roundRect(ropeX, 45, ropeWidth, 40, 10);
            ctx.fill();

            // Rope texture lines
            ctx.strokeStyle = '#5a4a2a';
            ctx.lineWidth = 2;
            for (let i = 0; i < 6; i++) {
                const x = ropeX + 10 + i * 12;
                ctx.beginPath();
                ctx.moveTo(x, 48);
                ctx.lineTo(x, 82);
                ctx.stroke();
            }

            // Center knot
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#4a3a1a';
            ctx.beginPath();
            ctx.arc(ropeX + ropeWidth/2, 65, 12, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#6a5a3a';
            ctx.beginPath();
            ctx.arc(ropeX + ropeWidth/2, 65, 8, 0, Math.PI * 2);
            ctx.fill();

            // ============================================
            // 🔴 RED TEAM CHARACTER (left side)
            // ============================================
            const redX = Math.max(30, ropeX - 60);
            const redY = h - 50;
            
            // Body - red
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#cc2222';
            ctx.beginPath();
            ctx.roundRect(redX - 20, redY - 50, 40, 55, 15);
            ctx.fill();
            
            // Body detail - darker red
            ctx.fillStyle = '#aa1111';
            ctx.beginPath();
            ctx.roundRect(redX - 15, redY - 40, 30, 35, 10);
            ctx.fill();
            
            // Head
            ctx.fillStyle = '#ffcc99';
            ctx.beginPath();
            ctx.arc(redX, redY - 60, 18, 0, Math.PI * 2);
            ctx.fill();
            
            // Helmet
            ctx.fillStyle = '#cc2222';
            ctx.beginPath();
            ctx.arc(redX, redY - 68, 20, Math.PI, 0);
            ctx.fill();
            
            // Helmet stripe
            ctx.fillStyle = '#ffdd44';
            ctx.fillRect(redX - 12, redY - 72, 24, 4);
            
            // Eyes
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(redX - 6, redY - 62, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(redX + 6, redY - 62, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(redX - 5, redY - 63, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(redX + 7, redY - 63, 1.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Arms pulling rope
            ctx.strokeStyle = '#ffcc99';
            ctx.lineWidth = 8;
            // Left arm
            ctx.beginPath();
            ctx.moveTo(redX - 15, redY - 35);
            ctx.lineTo(ropeX + 5, 55);
            ctx.stroke();
            // Right arm
            ctx.beginPath();
            ctx.moveTo(redX + 15, redY - 35);
            ctx.lineTo(ropeX + 15, 55);
            ctx.stroke();
            
            // Hands
            ctx.fillStyle = '#ffcc99';
            ctx.beginPath();
            ctx.arc(ropeX + 5, 55, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ropeX + 15, 55, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Legs
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(redX - 8, redY - 5);
            ctx.lineTo(redX - 12, redY + 5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(redX + 8, redY - 5);
            ctx.lineTo(redX + 12, redY + 5);
            ctx.stroke();
            
            // Shoes
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.roundRect(redX - 16, redY + 3, 12, 6, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(redX + 4, redY + 3, 12, 6, 3);
            ctx.fill();
            
            // Team label
            ctx.fillStyle = '#ff6b6b';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('🔴 RED', redX, redY - 85);

            // ============================================
            // 🔵 BLUE TEAM CHARACTER (right side)
            // ============================================
            const blueX = Math.min(w - 30, ropeX + ropeWidth + 60);
            const blueY = h - 50;
            
            // Body - blue
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#2266dd';
            ctx.beginPath();
            ctx.roundRect(blueX - 20, blueY - 50, 40, 55, 15);
            ctx.fill();
            
            // Body detail - darker blue
            ctx.fillStyle = '#1144aa';
            ctx.beginPath();
            ctx.roundRect(blueX - 15, blueY - 40, 30, 35, 10);
            ctx.fill();
            
            // Head
            ctx.fillStyle = '#ffcc99';
            ctx.beginPath();
            ctx.arc(blueX, blueY - 60, 18, 0, Math.PI * 2);
            ctx.fill();
            
            // Helmet
            ctx.fillStyle = '#2266dd';
            ctx.beginPath();
            ctx.arc(blueX, blueY - 68, 20, Math.PI, 0);
            ctx.fill();
            
            // Helmet stripe
            ctx.fillStyle = '#ffdd44';
            ctx.fillRect(blueX - 12, blueY - 72, 24, 4);
            
            // Eyes
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.arc(blueX - 6, blueY - 62, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(blueX + 6, blueY - 62, 3, 0, Math.PI * 2);
            ctx.fill();
            
            // Eye shine
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(blueX - 5, blueY - 63, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(blueX + 7, blueY - 63, 1.5, 0, Math.PI * 2);
            ctx.fill();
            
            // Arms pulling rope
            ctx.strokeStyle = '#ffcc99';
            ctx.lineWidth = 8;
            // Left arm
            ctx.beginPath();
            ctx.moveTo(blueX - 15, blueY - 35);
            ctx.lineTo(ropeX + ropeWidth - 5, 55);
            ctx.stroke();
            // Right arm
            ctx.beginPath();
            ctx.moveTo(blueX + 15, blueY - 35);
            ctx.lineTo(ropeX + ropeWidth - 15, 55);
            ctx.stroke();
            
            // Hands
            ctx.fillStyle = '#ffcc99';
            ctx.beginPath();
            ctx.arc(ropeX + ropeWidth - 5, 55, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(ropeX + ropeWidth - 15, 55, 6, 0, Math.PI * 2);
            ctx.fill();
            
            // Legs
            ctx.strokeStyle = '#222';
            ctx.lineWidth = 10;
            ctx.beginPath();
            ctx.moveTo(blueX - 8, blueY - 5);
            ctx.lineTo(blueX - 12, blueY + 5);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(blueX + 8, blueY - 5);
            ctx.lineTo(blueX + 12, blueY + 5);
            ctx.stroke();
            
            // Shoes
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.roundRect(blueX - 16, blueY + 3, 12, 6, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(blueX + 4, blueY + 3, 12, 6, 3);
            ctx.fill();
            
            // Team label
            ctx.fillStyle = '#6baaff';
            ctx.font = 'bold 14px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('🔵 BLUE', blueX, blueY - 85);

            // ============================================
            // WINNER INDICATOR
            // ============================================
            if (progress >= 100) {
                ctx.fillStyle = '#6baaff';
                ctx.font = 'bold 28px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🏆 BLUE TEAM WINS! 🏆', w/2, 30);
            } else if (progress <= 0) {
                ctx.fillStyle = '#ff6b6b';
                ctx.font = 'bold 28px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('🏆 RED TEAM WINS! 🏆', w/2, 30);
            }

            // Progress bar
            const barY = 15;
            const barW = w - 40;
            const barX = 20;
            ctx.fillStyle = '#00000044';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, 8, 4);
            ctx.fill();
            
            // Red progress
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.roundRect(barX, barY, (barW * (50 - Math.min(50, progress)) / 50), 8, 4);
            ctx.fill();
            
            // Blue progress
            ctx.fillStyle = '#6baaff';
            const blueBarWidth = (barW * Math.max(0, progress - 50) / 50);
            ctx.beginPath();
            ctx.roundRect(barX + barW/2, barY, blueBarWidth, 8, 4);
            ctx.fill();
            
            // Center marker
            ctx.fillStyle = '#ffffff88';
            ctx.beginPath();
            ctx.arc(barX + barW/2, barY + 4, 6, 0, Math.PI * 2);
            ctx.fill();
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                this.closePath();
                return this;
            };
        }

        // ============================================
        // UPDATE UI
        // ============================================
        function updateUI() {
            scoreRed.textContent = state.scoreRed;
            scoreBlue.textContent = state.scoreBlue;
            drawTug(state.tugProgress);
            
            if (state.role === 'red') {
                redName.textContent = '🔴 You (Red)';
                blueName.textContent = '🔵 Opponent (Blue)';
                playerDisplay.textContent = '👤 Role: Red Team';
                redBtn.classList.add('selected');
                blueBtn.classList.remove('selected');
                viewerBtn.classList.remove('selected');
                redBtn.disabled = true;
                blueBtn.disabled = false;
                viewerBtn.disabled = false;
            } else if (state.role === 'blue') {
                redName.textContent = '🔴 Opponent (Red)';
                blueName.textContent = '🔵 You (Blue)';
                playerDisplay.textContent = '👤 Role: Blue Team';
                blueBtn.classList.add('selected');
                redBtn.classList.remove('selected');
                viewerBtn.classList.remove('selected');
                blueBtn.disabled = true;
                redBtn.disabled = false;
                viewerBtn.disabled = false;
            } else if (state.role === 'viewer') {
                redName.textContent = '🔴 Team Red';
                blueName.textContent = '🔵 Team Blue';
                playerDisplay.textContent = '👁️ Role: Viewer';
                viewerBtn.classList.add('selected');
                redBtn.classList.remove('selected');
                blueBtn.classList.remove('selected');
                redBtn.disabled = false;
                blueBtn.disabled = false;
                viewerBtn.disabled = true;
            } else {
                redName.textContent = '🔴 Team Red';
                blueName.textContent = '🔵 Team Blue';
                playerDisplay.textContent = '👤 Role: —';
                redBtn.classList.remove('selected');
                blueBtn.classList.remove('selected');
                viewerBtn.classList.remove('selected');
                redBtn.disabled = false;
                blueBtn.disabled = false;
                viewerBtn.disabled = false;
            }
        }

        function animateScore(team) {
            const el = team === 'red' ? scoreRed : scoreBlue;
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
        }

        // ============================================
        // SHOW QUESTION
        // ============================================
        function showQuestionForPlayer() {
            const role = state.role;
            if (role === 'viewer') {
                questionDisplay.textContent = '👁️ Watching the game...';
                optionsContainer.innerHTML = '';
                return;
            }
            
            if (!role || !state.gameStarted) {
                questionDisplay.textContent = role ? '⏳ Waiting for opponent to join...' : 'Select your role to start!';
                optionsContainer.innerHTML = '';
                return;
            }
            
            const idx = (role === 'red') ? state.red_questionIdx : state.blue_questionIdx;
            if (idx >= state.questions.length) {
                questionDisplay.textContent = '🏆 All questions answered!';
                optionsContainer.innerHTML = '';
                statusMsg.innerHTML = '🎉 Game over! Check scores.';
                return;
            }
            
            const qData = state.questions[idx];
            questionDisplay.textContent = qData.q;
            optionsContainer.innerHTML = '';
            qData.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.dataset.index = i;
                btn.addEventListener('click', () => handleOptionClick(i));
                optionsContainer.appendChild(btn);
            });
            statusMsg.innerHTML = '📝 Choose your answer!';
            state.answering = false;
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = false);
            nextQuestionBtn.style.display = 'none';
        }

        // ============================================
        // HANDLE ANSWER - ROPE MOVES ONLY ON CORRECT
        // ============================================
        function handleOptionClick(selectedIdx) {
            if (state.answering || !state.role || !state.gameStarted || state.role === 'viewer') return;
            const role = state.role;
            
            const idx = (role === 'red') ? state.red_questionIdx : state.blue_questionIdx;
            if (idx >= state.questions.length) return;
            
            const qData = state.questions[idx];
            const isCorrect = (selectedIdx === qData.correct);
            state.answering = true;

            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((b, i) => {
                b.disabled = true;
                if (i === qData.correct) b.classList.add('correct');
                else if (i === selectedIdx && !isCorrect) b.classList.add('wrong');
            });

            if (isCorrect) {
                statusMsg.innerHTML = '✅ Correct! Pulling the rope!';
                if (role === 'red') {
                    state.scoreRed += 1;
                    state.tugProgress = Math.max(0, state.tugProgress - 5);
                    state.red_questionIdx += 1;
                    animateScore('red');
                } else {
                    state.scoreBlue += 1;
                    state.tugProgress = Math.min(100, state.tugProgress + 5);
                    state.blue_questionIdx += 1;
                    animateScore('blue');
                }
                updateUI();
                saveGameState();
                nextQuestionBtn.style.display = 'inline-block';
                
                const nextIdx = (role === 'red') ? state.red_questionIdx : state.blue_questionIdx;
                if (nextIdx >= state.questions.length) {
                    statusMsg.innerHTML = `🎉 ${role === 'red' ? 'Red' : 'Blue'} Team completed all questions!`;
                }
            } else {
                statusMsg.innerHTML = '❌ Wrong answer. Try again!';
                setTimeout(() => {
                    if (state.gameStarted) {
                        document.querySelectorAll('.option-btn').forEach(b => {
                            b.disabled = false;
                            b.classList.remove('correct', 'wrong');
                        });
                        state.answering = false;
                        statusMsg.innerHTML = '📝 Try again!';
                    }
                }, 1200);
            }
            updateUI();
        }

        // ============================================
        // FIREBASE OPERATIONS
        // ============================================
        const GAME_PATH = 'games/55555';

        function saveGameState() {
            const gameRef = db.ref(GAME_PATH);
            gameRef.update({
                scoreRed: state.scoreRed,
                scoreBlue: state.scoreBlue,
                tugProgress: state.tugProgress,
                red_questionIdx: state.red_questionIdx,
                blue_questionIdx: state.blue_questionIdx,
                lastUpdated: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function listenToGame() {
            const gameRef = db.ref(GAME_PATH);
            
            if (state.listeners.game) {
                state.listeners.game();
            }
            
            state.listeners.game = gameRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    initializeGame();
                    return;
                }
                
                state.connected = true;
                onlineStatus.textContent = '🟢 Connected';
                onlineStatus.style.color = '#4caf84';
                loadingOverlay.classList.add('hidden');
                
                // Update viewer count
                const viewers = data.viewers || {};
                const viewerCountNum = Object.keys(viewers).length;
                viewerCount.textContent = `👁️ Viewers: ${viewerCountNum}`;
                
                // Update role button states
                updateRoleButtons(data.players);
                
                // Update game state from Firebase
                const oldScoreRed = state.scoreRed;
                const oldScoreBlue = state.scoreBlue;
                
                state.scoreRed = data.scoreRed || 0;
                state.scoreBlue = data.scoreBlue || 0;
                state.tugProgress = data.tugProgress || 50;
                state.red_questionIdx = data.red_questionIdx || 0;
                state.blue_questionIdx = data.blue_questionIdx || 0;
                state.questions = data.questions || SAMPLE_QUESTIONS;
                
                // Check if both teams are here
                const players = data.players || {};
                const hasRed = players.red === true;
                const hasBlue = players.blue === true;
                
                if (hasRed && hasBlue) {
                    state.gameStarted = true;
                    if (state.role !== 'viewer') {
                        statusMsg.innerHTML = '🎮 Both teams ready! Answer to pull!';
                    } else {
                        statusMsg.innerHTML = '👁️ Watching the match!';
                    }
                } else if (hasRed || hasBlue) {
                    state.gameStarted = false;
                    statusMsg.innerHTML = '⏳ Waiting for other team to join...';
                } else {
                    state.gameStarted = false;
                    statusMsg.innerHTML = '👥 Waiting for teams to join...';
                }
                
                updateUI();
                
                if (state.scoreRed !== oldScoreRed) animateScore('red');
                if (state.scoreBlue !== oldScoreBlue) animateScore('blue');
                
                showQuestionForPlayer();
            });
        }

        function updateRoleButtons(players) {
            const hasRed = players && players.red === true;
            const hasBlue = players && players.blue === true;
            
            if (state.role !== 'red') {
                redBtn.classList.toggle('taken', hasRed);
                redBtn.disabled = hasRed;
                if (hasRed) {
                    redBtn.innerHTML = '🔴 Team Red <span class="taken-badge">TAKEN</span>';
                } else {
                    redBtn.innerHTML = '🔴 Team Red';
                }
            }
            
            if (state.role !== 'blue') {
                blueBtn.classList.toggle('taken', hasBlue);
                blueBtn.disabled = hasBlue;
                if (hasBlue) {
                    blueBtn.innerHTML = '🔵 Team Blue <span class="taken-badge">TAKEN</span>';
                } else {
                    blueBtn.innerHTML = '🔵 Team Blue';
                }
            }
        }

        function resetUIState() {
            state.role = null;
            state.gameStarted = false;
            state.scoreRed = 0;
            state.scoreBlue = 0;
            state.tugProgress = 50;
            state.red_questionIdx = 0;
            state.blue_questionIdx = 0;
            state.answering = false;
            state.isJoining = false;
            
            gameArea.classList.remove('active');
            updateUI();
            questionDisplay.textContent = 'Select your role to start!';
            optionsContainer.innerHTML = '';
            statusMsg.innerHTML = '👥 Choose a role above';
            nextQuestionBtn.style.display = 'none';
            
            redBtn.classList.remove('selected', 'taken');
            blueBtn.classList.remove('selected', 'taken');
            viewerBtn.classList.remove('selected');
            redBtn.innerHTML = '🔴 Team Red';
            blueBtn.innerHTML = '🔵 Team Blue';
            redBtn.disabled = false;
            blueBtn.disabled = false;
            viewerBtn.disabled = false;
        }

        function initializeGame() {
            const gameRef = db.ref(GAME_PATH);
            gameRef.set({
                players: { red: false, blue: false },
                viewers: {},
                scoreRed: 0,
                scoreBlue: 0,
                tugProgress: 50,
                red_questionIdx: 0,
                blue_questionIdx: 0,
                questions: shuffleArray([...SAMPLE_QUESTIONS]),
                created: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ============================================
        // ROLE SELECTION USING TRANSACTION
        // ============================================
        function selectRole(role) {
            if (state.role === role) return;
            if (state.isJoining) return;
            
            state.isJoining = true;
            statusMsg.innerHTML = '<span class="spinner"></span> Joining...';
            
            const gameRef = db.ref(GAME_PATH);
            
            gameRef.transaction((currentData) => {
                if (currentData === null) {
                    return {
                        players: { red: false, blue: false },
                        viewers: {},
                        scoreRed: 0,
                        scoreBlue: 0,
                        tugProgress: 50,
                        red_questionIdx: 0,
                        blue_questionIdx: 0,
                        questions: shuffleArray([...SAMPLE_QUESTIONS]),
                        created: firebase.database.ServerValue.TIMESTAMP
                    };
                }
                
                if (role === 'viewer') {
                    if (!currentData.viewers) currentData.viewers = {};
                    const viewerId = Date.now().toString(36) + Math.random().toString(36).substr(2, 5);
                    currentData.viewers[viewerId] = true;
                    currentData._viewerId = viewerId;
                    return currentData;
                }
                
                const players = currentData.players || {};
                if (players[role] === true) {
                    return undefined;
                }
                
                players[role] = true;
                currentData.players = players;
                
                return currentData;
            }, (error, committed, snapshot) => {
                state.isJoining = false;
                
                if (error) {
                    console.error('Transaction error:', error);
                    statusMsg.innerHTML = '❌ Error joining. Please try again.';
                    return;
                }
                
                if (!committed) {
                    if (role === 'viewer') {
                        state.role = 'viewer';
                        state.isViewer = true;
                        gameArea.classList.add('active');
                        updateUI();
                        showQuestionForPlayer();
                        statusMsg.innerHTML = '👁️ You are watching the game!';
                        return;
                    }
                    alert(`❌ Team ${role === 'red' ? 'Red' : 'Blue'} is already taken!\n\nChoose the other team or become a viewer.`);
                    statusMsg.innerHTML = '👥 Team taken. Choose another role.';
                    const data = snapshot ? snapshot.val() : null;
                    if (data) updateRoleButtons(data.players);
                    return;
                }
                
                const data = snapshot.val();
                if (!data) return;
                
                if (role === 'viewer') {
                    state.role = 'viewer';
                    state.isViewer = true;
                    gameArea.classList.add('active');
                    updateUI();
                    showQuestionForPlayer();
                    statusMsg.innerHTML = '👁️ You are watching the game!';
                    return;
                }
                
                state.role = role;
                state.isViewer = false;
                state.scoreRed = data.scoreRed || 0;
                state.scoreBlue = data.scoreBlue || 0;
                state.tugProgress = data.tugProgress || 50;
                state.red_questionIdx = data.red_questionIdx || 0;
                state.blue_questionIdx = data.blue_questionIdx || 0;
                state.questions = data.questions || SAMPLE_QUESTIONS;
                
                const players = data.players || {};
                const otherTeam = role === 'red' ? 'blue' : 'red';
                const otherTaken = players[otherTeam] === true;
                
                if (otherTaken) {
                    state.gameStarted = true;
                    statusMsg.innerHTML = `🎮 You are ${role === 'red' ? 'Red' : 'Blue'} Team! Game is on!`;
                } else {
                    state.gameStarted = false;
                    statusMsg.innerHTML = `🎮 You are ${role === 'red' ? 'Red' : 'Blue'} Team! Waiting for opponent...`;
                }
                
                gameArea.classList.add('active');
                updateUI();
                showQuestionForPlayer();
                saveGameState();
            }, false);
        }

        // ============================================
        // LEAVE GAME
        // ============================================
        function leaveGame() {
            if (!state.role) {
                alert('You are not in the game.');
                return;
            }
            
            if (confirm(`Leave the game as ${state.role === 'viewer' ? 'Viewer' : state.role === 'red' ? 'Red Team' : 'Blue Team'}?`)) {
                const gameRef = db.ref(GAME_PATH);
                
                if (state.role === 'viewer') {
                    gameRef.once('value', (snapshot) => {
                        const data = snapshot.val();
                        if (data && data.viewers) {
                            gameRef.child('viewers').set({});
                        }
                        state.role = null;
                        state.isViewer = false;
                        gameArea.classList.remove('active');
                        resetUIState();
                        statusMsg.innerHTML = '👋 You left the game. Choose a role to rejoin.';
                        updateUI();
                    });
                } else {
                    const playerRef = db.ref(`${GAME_PATH}/players/${state.role}`);
                    playerRef.set(false).then(() => {
                        state.role = null;
                        gameArea.classList.remove('active');
                        resetUIState();
                        statusMsg.innerHTML = '👋 You left the game. Choose a role to rejoin.';
                        updateUI();
                    });
                }
            }
        }

        // ============================================
        // FORCE RESET
        // ============================================
        function forceReset() {
            if (confirm('⚠️ FORCE RESET: This will clear ALL game data for PIN 55555.\n\nAll players will need to rejoin.\n\nAre you sure?')) {
                const gameRef = db.ref(GAME_PATH);
                gameRef.remove().then(() => {
                    resetUIState();
                    statusMsg.innerHTML = '✅ Game reset! All roles are now available.';
                    initializeGame();
                    updateUI();
                }).catch((err) => {
                    alert('Error resetting: ' + err.message);
                });
            }
        }

        // ============================================
        // CONNECTION STATUS
        // ============================================
        function checkConnection() {
            const connectedRef = db.ref('.info/connected');
            connectedRef.on('value', (snap) => {
                if (snap.val() === true) {
                    state.connected = true;
                    onlineStatus.textContent = '🟢 Connected';
                    onlineStatus.style.color = '#4caf84';
                    loadingOverlay.classList.add('hidden');
                } else {
                    state.connected = false;
                    onlineStatus.textContent = '🔴 Disconnected';
                    onlineStatus.style.color = '#c94a4a';
                    statusMsg.innerHTML = '<span class="spinner"></span> Reconnecting...';
                    loadingOverlay.classList.remove('hidden');
                }
            });
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        redBtn.addEventListener('click', () => selectRole('red'));
        blueBtn.addEventListener('click', () => selectRole('blue'));
        viewerBtn.addEventListener('click', () => selectRole('viewer'));
        forceResetBtn.addEventListener('click', forceReset);
        leaveBtn.addEventListener('click', leaveGame);
        nextQuestionBtn.addEventListener('click', () => {
            showQuestionForPlayer();
            nextQuestionBtn.style.display = 'none';
        });

        // ============================================
        // INIT
        // ============================================
        drawTug(50);
        checkConnection();
        listenToGame();
        
        console.log('🎮 Tug of War loaded! PIN: 55555');
        console.log('📌 Share this page with friends on any device!');
        console.log('🔑 Fixed PIN: 55555');
        console.log('🔴 Team Red vs 🔵 Team Blue');
        console.log('👁️ Viewers can watch without playing');
        console.log('✅ Rope moves ONLY on correct answers!');
    </script>
