<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tug of War - PIN: 55555</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b1a2f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 16px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #1a2f44;
            border-radius: 40px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #f9d976, #f39b7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .pin-display {
            background: #f9d976;
            color: #0b1a2f;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 8px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 4px 0 #b38f40;
        }
        .team-select {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .team-btn {
            background: #2c4b66;
            border: 3px solid #3d6485;
            border-radius: 40px;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 120px;
            max-width: 200px;
        }
        .team-btn:active {
            transform: scale(0.96);
        }
        .team-btn.selected {
            border-color: #f9d976;
            background: #3d6485;
            box-shadow: 0 0 20px #f9d97644;
        }
        .team-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .game-area {
            display: none;
        }
        .game-area.active {
            display: block;
        }
        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .team-name {
            background: #0e1f30;
            padding: 8px 20px;
            border-radius: 30px;
            min-width: 100px;
        }
        .score {
            background: #00000033;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 1.8rem;
            min-width: 70px;
        }
        .tug-canvas-wrap {
            background: #0e1f30;
            border-radius: 60px;
            padding: 16px 10px;
            margin: 16px 0;
        }
        canvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 30px;
            background: #1d3850;
            touch-action: none;
        }
        .question-box {
            background: #0e1f30;
            border-radius: 30px;
            padding: 20px 16px;
            margin: 16px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            line-height: 1.6;
            word-break: break-word;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0 18px;
        }
        .option-btn {
            background: #2c4b66;
            border: 2px solid #3d6485;
            border-radius: 40px;
            padding: 14px 8px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
        }
        .option-btn:active {
            background: #3d6485;
            transform: scale(0.96);
        }
        .option-btn.correct {
            background: #2e7d5e;
            border-color: #4caf84;
        }
        .option-btn.wrong {
            background: #9e4a4a;
            border-color: #c96a6a;
        }
        .option-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .status-msg {
            font-size: 0.95rem;
            background: #0e1f30;
            padding: 12px;
            border-radius: 40px;
            margin: 8px 0;
        }
        .footer-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 18px;
        }
        .btn {
            background: #f9d976;
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-weight: 700;
            font-size: 1rem;
            color: #0b1a2f;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #b38f40;
            touch-action: manipulation;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .btn.secondary {
            background: #4a6a85;
            box-shadow: 0 4px 0 #1f3a52;
            color: #fff;
        }
        .btn.danger {
            background: #c94a4a;
            box-shadow: 0 4px 0 #7a2a2a;
            color: #fff;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
            box-shadow: 0 4px 0 #b38f40;
        }
        .waiting-msg {
            background: #0e1f30;
            padding: 20px;
            border-radius: 30px;
            margin: 10px 0;
            font-size: 1.1rem;
        }
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 4px solid #ffffff33;
            border-top: 4px solid #f9d976;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .player-badge {
            background: #0e1f30;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-block;
        }
        @media (max-width: 550px) {
            .container { padding: 16px 12px; }
            .options-grid { grid-template-columns: 1fr; }
            .team-btn { min-width: 100px; padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ TUG OF WAR</h1>
        <div class="sub">multiplayer · same device or cross-tab</div>
        
        <!-- Fixed PIN Display -->
        <div class="pin-display">🔑 55555</div>
        
        <!-- Team Selection -->
        <div class="team-select" id="teamSelect">
            <button class="team-btn" id="teamAbtn">🟦 Team A</button>
            <button class="team-btn" id="teamBbtn">🟥 Team B</button>
        </div>

        <!-- Game Area -->
        <div class="game-area" id="gameArea">
            <div class="team-row">
                <span class="team-name" id="teamAName">🟦 Team A</span>
                <span class="score" id="scoreA">0</span>
                <span style="font-size:1.8rem;">⚔️</span>
                <span class="score" id="scoreB">0</span>
                <span class="team-name" id="teamBName">🟥 Team B</span>
            </div>

            <div class="tug-canvas-wrap">
                <canvas id="tugCanvas" width="600" height="120"></canvas>
            </div>

            <div class="question-box" id="questionDisplay">Select your team to start!</div>

            <div class="options-grid" id="optionsContainer"></div>

            <div class="status-msg" id="statusMsg">👉 Choose Team A or B above</div>

            <div class="footer-btns">
                <button class="btn secondary" id="nextQuestionBtn" style="display:none;">⏩ Next Question</button>
                <button class="btn danger" id="resetBtn">🔄 Reset Game</button>
                <span class="player-badge" id="playerDisplay">👤 Team: —</span>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // SIMPLE MULTIPLAYER USING localStorage + BroadcastChannel
        // Works across tabs on the same device/browser
        // Fixed PIN: 55555
        // ============================================

        const STORAGE_KEY = 'tug_game_55555';
        const CHANNEL_NAME = 'tug_channel_55555';

        // ============================================
        // SAMPLE QUESTIONS (20+)
        // ============================================
        const SAMPLE_QUESTIONS = [
            { q: "What is the capital of France?", options: ["Paris", "London", "Berlin", "Madrid"], correct: 0 },
            { q: "Which planet is known as the Red Planet?", options: ["Venus", "Mars", "Jupiter", "Saturn"], correct: 1 },
            { q: "What is 7 × 8?", options: ["48", "56", "64", "72"], correct: 1 },
            { q: "Who painted the Mona Lisa?", options: ["Michelangelo", "Leonardo da Vinci", "Raphael", "Donatello"], correct: 1 },
            { q: "What is the smallest prime number?", options: ["0", "1", "2", "3"], correct: 2 },
            { q: "Which ocean is the largest?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 },
            { q: "What is the chemical symbol for water?", options: ["H2O", "CO2", "NaCl", "HCl"], correct: 0 },
            { q: "Who wrote 'Hamlet'?", options: ["Shakespeare", "Dickens", "Hemingway", "Tolkien"], correct: 0 },
            { q: "What is the speed of light approx? (km/s)", options: ["300,000", "150,000", "500,000", "1,000,000"], correct: 0 },
            { q: "Which country has the most people?", options: ["India", "China", "USA", "Indonesia"], correct: 0 },
            { q: "What is the freezing point of water in Celsius?", options: ["0", "32", "100", "-1"], correct: 0 },
            { q: "Which animal is the fastest on land?", options: ["Lion", "Cheetah", "Horse", "Gazelle"], correct: 1 },
            { q: "What is the square root of 144?", options: ["10", "11", "12", "13"], correct: 2 },
            { q: "Which gas do plants absorb?", options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], correct: 2 },
            { q: "What is the longest river in the world?", options: ["Nile", "Amazon", "Yangtze", "Mississippi"], correct: 0 },
            { q: "How many continents are there?", options: ["5", "6", "7", "8"], correct: 2 },
            { q: "Which element has the symbol 'Au'?", options: ["Silver", "Gold", "Iron", "Copper"], correct: 1 },
            { q: "What year did WWII end?", options: ["1944", "1945", "1946", "1947"], correct: 1 },
            { q: "Which is the smallest country?", options: ["Monaco", "Vatican", "San Marino", "Liechtenstein"], correct: 1 },
            { q: "What is the main ingredient in guacamole?", options: ["Tomato", "Avocado", "Onion", "Pepper"], correct: 1 },
            { q: "How many teeth does an adult human have?", options: ["28", "30", "32", "34"], correct: 2 },
            { q: "Which blood type is the rarest?", options: ["AB negative", "A positive", "B negative", "O positive"], correct: 0 },
        ];

        // ============================================
        // GAME STATE
        // ============================================
        const state = {
            playerId: null, // 'A' or 'B'
            questions: [],
            scoreA: 0,
            scoreB: 0,
            tugProgress: 50,
            teamA_questionIdx: 0,
            teamB_questionIdx: 0,
            answering: false,
            gameStarted: false,
        };

        // ============================================
        // DOM REFS
        // ============================================
        const $ = id => document.getElementById(id);
        const teamAbtn = $('teamAbtn');
        const teamBbtn = $('teamBbtn');
        const teamSelect = $('teamSelect');
        const gameArea = $('gameArea');
        const teamAName = $('teamAName');
        const teamBName = $('teamBName');
        const scoreA = $('scoreA');
        const scoreB = $('scoreB');
        const tugCanvas = $('tugCanvas');
        const ctx = tugCanvas.getContext('2d');
        const questionDisplay = $('questionDisplay');
        const optionsContainer = $('optionsContainer');
        const statusMsg = $('statusMsg');
        const nextQuestionBtn = $('nextQuestionBtn');
        const resetBtn = $('resetBtn');
        const playerDisplay = $('playerDisplay');

        // ============================================
        // BROADCAST CHANNEL (for cross-tab sync)
        // ============================================
        let channel = null;
        try {
            channel = new BroadcastChannel(CHANNEL_NAME);
        } catch(e) {
            console.warn('BroadcastChannel not supported, using storage events only.');
        }

        // ============================================
        // CANVAS DRAWING
        // ============================================
        function drawTug(progress) {
            const w = tugCanvas.width, h = tugCanvas.height;
            ctx.clearRect(0, 0, w, h);
            const grad = ctx.createLinearGradient(0, 0, w, 0);
            grad.addColorStop(0, '#2a6f8f');
            grad.addColorStop(0.5, '#4a8aaa');
            grad.addColorStop(1, '#2a6f8f');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(10, 30, w-20, 50, 25);
            ctx.fill();

            const ropeX = 10 + (progress / 100) * (w - 20 - 40);
            ctx.fillStyle = '#c9a87c';
            ctx.beginPath();
            ctx.roundRect(ropeX, 30, 40, 50, 12);
            ctx.fill();
            ctx.fillStyle = '#8b6b40';
            ctx.font = 'bold 28px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚡', ropeX+20, 55);

            ctx.font = 'bold 16px sans-serif';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'left';
            ctx.fillText('A', 20, 110);
            ctx.textAlign = 'right';
            ctx.fillText('B', w-20, 110);

            ctx.fillStyle = '#ffffff66';
            for (let i = 0; i <= 10; i++) {
                const x = 10 + (i / 10) * (w - 20);
                ctx.fillRect(x-1, 20, 2, 12);
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                this.closePath();
                return this;
            };
        }

        // ============================================
        // SAVE / LOAD GAME STATE
        // ============================================
        function saveGameState() {
            const data = {
                scoreA: state.scoreA,
                scoreB: state.scoreB,
                tugProgress: state.tugProgress,
                teamA_questionIdx: state.teamA_questionIdx,
                teamB_questionIdx: state.teamB_questionIdx,
                questions: state.questions,
                timestamp: Date.now()
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            
            // Broadcast to other tabs
            if (channel) {
                try {
                    channel.postMessage({ type: 'update', data: data });
                } catch(e) { /* ignore */ }
            }
        }

        function loadGameState() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return false;
            try {
                const data = JSON.parse(raw);
                state.scoreA = data.scoreA || 0;
                state.scoreB = data.scoreB || 0;
                state.tugProgress = data.tugProgress || 50;
                state.teamA_questionIdx = data.teamA_questionIdx || 0;
                state.teamB_questionIdx = data.teamB_questionIdx || 0;
                state.questions = data.questions || SAMPLE_QUESTIONS;
                return true;
            } catch(e) {
                return false;
            }
        }

        // ============================================
        // UPDATE UI
        // ============================================
        function updateUI() {
            scoreA.textContent = state.scoreA;
            scoreB.textContent = state.scoreB;
            drawTug(state.tugProgress);
            
            if (state.playerId === 'A') {
                teamAName.textContent = '🟦 You (A)';
                teamBName.textContent = '🟥 Opponent (B)';
                playerDisplay.textContent = '👤 Team: A';
                teamAbtn.classList.add('selected');
                teamBbtn.classList.remove('selected');
                teamAbtn.disabled = true;
                teamBbtn.disabled = false;
            } else if (state.playerId === 'B') {
                teamAName.textContent = '🟦 Opponent (A)';
                teamBName.textContent = '🟥 You (B)';
                playerDisplay.textContent = '👤 Team: B';
                teamBbtn.classList.add('selected');
                teamAbtn.classList.remove('selected');
                teamBbtn.disabled = true;
                teamAbtn.disabled = false;
            } else {
                teamAName.textContent = '🟦 Team A';
                teamBName.textContent = '🟥 Team B';
                playerDisplay.textContent = '👤 Team: —';
                teamAbtn.classList.remove('selected');
                teamBbtn.classList.remove('selected');
                teamAbtn.disabled = false;
                teamBbtn.disabled = false;
            }
        }

        // ============================================
        // SHOW QUESTION
        // ============================================
        function showQuestionForPlayer() {
            const pid = state.playerId;
            if (!pid) {
                questionDisplay.textContent = 'Select your team to start!';
                optionsContainer.innerHTML = '';
                return;
            }
            
            const idx = (pid === 'A') ? state.teamA_questionIdx : state.teamB_questionIdx;
            if (idx >= state.questions.length) {
                questionDisplay.textContent = '🏆 All questions answered!';
                optionsContainer.innerHTML = '';
                statusMsg.textContent = 'Game over! Check scores.';
                return;
            }
            
            const qData = state.questions[idx];
            questionDisplay.textContent = qData.q;
            optionsContainer.innerHTML = '';
            qData.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.dataset.index = i;
                btn.addEventListener('click', () => handleOptionClick(i));
                optionsContainer.appendChild(btn);
            });
            statusMsg.textContent = '📝 Choose your answer!';
            state.answering = false;
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = false);
            nextQuestionBtn.style.display = 'none';
        }

        // ============================================
        // HANDLE ANSWER
        // ============================================
        function handleOptionClick(selectedIdx) {
            if (state.answering || !state.playerId) return;
            const pid = state.playerId;
            
            const idx = (pid === 'A') ? state.teamA_questionIdx : state.teamB_questionIdx;
            if (idx >= state.questions.length) return;
            
            const qData = state.questions[idx];
            const isCorrect = (selectedIdx === qData.correct);
            state.answering = true;

            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((b, i) => {
                b.disabled = true;
                if (i === qData.correct) b.classList.add('correct');
                else if (i === selectedIdx && !isCorrect) b.classList.add('wrong');
            });

            if (isCorrect) {
                statusMsg.textContent = '✅ Correct! Pulling the rope!';
                if (pid === 'A') {
                    state.scoreA += 1;
                    state.tugProgress = Math.min(100, state.tugProgress + 2);
                    state.teamA_questionIdx += 1;
                } else {
                    state.scoreB += 1;
                    state.tugProgress = Math.max(0, state.tugProgress - 2);
                    state.teamB_questionIdx += 1;
                }
                updateUI();
                saveGameState();
                nextQuestionBtn.style.display = 'inline-block';
                
                const nextIdx = (pid === 'A') ? state.teamA_questionIdx : state.teamB_questionIdx;
                if (nextIdx >= state.questions.length) {
                    statusMsg.textContent = `🎉 Team ${pid} completed all questions!`;
                }
            } else {
                statusMsg.textContent = '❌ Wrong answer. Try again!';
                setTimeout(() => {
                    document.querySelectorAll('.option-btn').forEach(b => {
                        b.disabled = false;
                        b.classList.remove('correct', 'wrong');
                    });
                    state.answering = false;
                    statusMsg.textContent = '📝 Try again!';
                }, 1200);
            }
            updateUI();
        }

        // ============================================
        // SYNC FROM OTHER TABS
        // ============================================
        function syncFromStorage() {
            const raw = localStorage.getItem(STORAGE_KEY);
            if (!raw) return;
            try {
                const data = JSON.parse(raw);
                // Only update if data is newer (optional)
                state.scoreA = data.scoreA || 0;
                state.scoreB = data.scoreB || 0;
                state.tugProgress = data.tugProgress || 50;
                state.teamA_questionIdx = data.teamA_questionIdx || 0;
                state.teamB_questionIdx = data.teamB_questionIdx || 0;
                if (data.questions) state.questions = data.questions;
                updateUI();
                showQuestionForPlayer();
            } catch(e) { /* ignore */ }
        }

        // Listen for storage events (other tabs)
        window.addEventListener('storage', (e) => {
            if (e.key === STORAGE_KEY) {
                syncFromStorage();
            }
        });

        // Listen for broadcast channel messages
        if (channel) {
            channel.onmessage = (event) => {
                if (event.data && event.data.type === 'update') {
                    syncFromStorage();
                }
            };
        }

        // ============================================
        // TEAM SELECTION
        // ============================================
        function selectTeam(team) {
            if (state.playerId === team) return;
            
            // Check if team is already taken
            const raw = localStorage.getItem(STORAGE_KEY);
            if (raw) {
                try {
                    const data = JSON.parse(raw);
                    // Check if this team is already assigned to another player
                    // We'll use a simple flag in localStorage
                    const teamKey = `tug_team_55555_${team}`;
                    if (localStorage.getItem(teamKey) === 'taken') {
                        alert(`Team ${team} is already taken! Please choose the other team.`);
                        return;
                    }
                } catch(e) { /* ignore */ }
            }
            
            // Load existing game state or initialize
            const hasExisting = loadGameState();
            if (!hasExisting) {
                state.questions = shuffleArray([...SAMPLE_QUESTIONS]);
                state.scoreA = 0;
                state.scoreB = 0;
                state.tugProgress = 50;
                state.teamA_questionIdx = 0;
                state.teamB_questionIdx = 0;
            }
            
            state.playerId = team;
            
            // Mark team as taken
            const teamKey = `tug_team_55555_${team}`;
            localStorage.setItem(teamKey, 'taken');
            // Also mark the other team as available (in case of reset)
            const otherTeam = (team === 'A') ? 'B' : 'A';
            localStorage.removeItem(`tug_team_55555_${otherTeam}`);
            
            gameArea.classList.add('active');
            updateUI();
            showQuestionForPlayer();
            statusMsg.textContent = `🎮 You are Team ${team}! Answer to pull the rope!`;
            saveGameState();
        }

        // ============================================
        // RESET GAME
        // ============================================
        function resetGame() {
            if (confirm('Reset the game for everyone?')) {
                localStorage.removeItem(STORAGE_KEY);
                localStorage.removeItem('tug_team_55555_A');
                localStorage.removeItem('tug_team_55555_B');
                
                state.playerId = null;
                state.scoreA = 0;
                state.scoreB = 0;
                state.tugProgress = 50;
                state.teamA_questionIdx = 0;
                state.teamB_questionIdx = 0;
                state.questions = shuffleArray([...SAMPLE_QUESTIONS]);
                state.answering = false;
                
                gameArea.classList.remove('active');
                updateUI();
                questionDisplay.textContent = 'Select your team to start!';
                optionsContainer.innerHTML = '';
                statusMsg.textContent = '👉 Choose Team A or B above';
                nextQuestionBtn.style.display = 'none';
                
                if (channel) {
                    try {
                        channel.postMessage({ type: 'reset' });
                    } catch(e) { /* ignore */ }
                }
                saveGameState();
            }
        }

        // Listen for reset messages
        if (channel) {
            const origHandler = channel.onmessage;
            channel.onmessage = (event) => {
                if (event.data && event.data.type === 'reset') {
                    // Just reload state
                    loadGameState();
                    if (state.playerId) {
                        gameArea.classList.add('active');
                        updateUI();
                        showQuestionForPlayer();
                    }
                }
                if (event.data && event.data.type === 'update') {
                    syncFromStorage();
                }
            };
        }

        // ============================================
        // UTILITY
        // ============================================
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function advanceToNextQuestion() {
            showQuestionForPlayer();
            nextQuestionBtn.style.display = 'none';
            if (state.teamA_questionIdx >= state.questions.length && state.teamB_questionIdx >= state.questions.length) {
                statusMsg.textContent = '🏁 Both teams finished! Final scores.';
            }
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        teamAbtn.addEventListener('click', () => selectTeam('A'));
        teamBbtn.addEventListener('click', () => selectTeam('B'));
        resetBtn.addEventListener('click', resetGame);
        nextQuestionBtn.addEventListener('click', advanceToNextQuestion);

        // ============================================
        // AUTO-RECOVER SESSION
        // ============================================
        // Check if there's a saved game and team assignment
        (function autoRecover() {
            // Check if we have a team assigned
            let assignedTeam = null;
            if (localStorage.getItem('tug_team_55555_A') === 'taken') assignedTeam = 'A';
            else if (localStorage.getItem('tug_team_55555_B') === 'taken') assignedTeam = 'B';
            
            if (assignedTeam) {
                const hasData = loadGameState();
                if (hasData) {
                    state.playerId = assignedTeam;
                    gameArea.classList.add('active');
                    updateUI();
                    showQuestionForPlayer();
                    statusMsg.textContent = `🔄 Rejoined as Team ${assignedTeam}`;
                }
            }
        })();

        // ============================================
        // INIT
        // ============================================
        drawTug(50);
        console.log('🎮 Tug of War loaded! PIN: 55555');
        console.log('📌 Open this page in two tabs to play against yourself,');
        console.log('   or share the link with a friend on the same device.');
    </script>
</body>
</html>
