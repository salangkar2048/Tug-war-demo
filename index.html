<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Tug of War - PIN: 55555</title>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b1a2f;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            padding: 16px;
        }
        .container {
            max-width: 800px;
            width: 100%;
            background: #1a2f44;
            border-radius: 40px;
            padding: 24px 20px 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            margin-bottom: 4px;
            background: linear-gradient(135deg, #f9d976, #f39b7b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sub {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 20px;
        }
        .pin-display {
            background: #f9d976;
            color: #0b1a2f;
            padding: 10px 20px;
            border-radius: 60px;
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 8px;
            display: inline-block;
            margin-bottom: 20px;
            box-shadow: 0 4px 0 #b38f40;
        }
        .team-select {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .team-btn {
            background: #2c4b66;
            border: 3px solid #3d6485;
            border-radius: 40px;
            padding: 16px 32px;
            font-size: 1.2rem;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            min-width: 120px;
            max-width: 200px;
        }
        .team-btn:active {
            transform: scale(0.96);
        }
        .team-btn.selected {
            border-color: #f9d976;
            background: #3d6485;
            box-shadow: 0 0 20px #f9d97644;
        }
        .team-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .team-btn.taken {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .game-area {
            display: none;
        }
        .game-area.active {
            display: block;
        }
        .team-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0;
            font-weight: 600;
            font-size: 1.2rem;
        }
        .team-name {
            background: #0e1f30;
            padding: 8px 20px;
            border-radius: 30px;
            min-width: 100px;
        }
        .score {
            background: #00000033;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 1.8rem;
            min-width: 70px;
            transition: all 0.3s;
        }
        .score.pop {
            animation: pop 0.3s ease;
        }
        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.3); background: #f9d97633; }
            100% { transform: scale(1); }
        }
        .tug-canvas-wrap {
            background: #0e1f30;
            border-radius: 60px;
            padding: 16px 10px;
            margin: 16px 0;
        }
        canvas {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 30px;
            background: #1d3850;
            touch-action: none;
        }
        .question-box {
            background: #0e1f30;
            border-radius: 30px;
            padding: 20px 16px;
            margin: 16px 0;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            line-height: 1.6;
            word-break: break-word;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 12px 0 18px;
        }
        .option-btn {
            background: #2c4b66;
            border: 2px solid #3d6485;
            border-radius: 40px;
            padding: 14px 8px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: 0.15s;
            touch-action: manipulation;
        }
        .option-btn:active {
            background: #3d6485;
            transform: scale(0.96);
        }
        .option-btn.correct {
            background: #2e7d5e;
            border-color: #4caf84;
        }
        .option-btn.wrong {
            background: #9e4a4a;
            border-color: #c96a6a;
        }
        .option-btn:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }
        .status-msg {
            font-size: 0.95rem;
            background: #0e1f30;
            padding: 12px;
            border-radius: 40px;
            margin: 8px 0;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .footer-btns {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            margin-top: 18px;
        }
        .btn {
            background: #f9d976;
            border: none;
            border-radius: 40px;
            padding: 12px 28px;
            font-weight: 700;
            font-size: 1rem;
            color: #0b1a2f;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #b38f40;
            touch-action: manipulation;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }
        .btn.secondary {
            background: #4a6a85;
            box-shadow: 0 4px 0 #1f3a52;
            color: #fff;
        }
        .btn.danger {
            background: #c94a4a;
            box-shadow: 0 4px 0 #7a2a2a;
            color: #fff;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: none;
            cursor: not-allowed;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #ffffff33;
            border-top: 3px solid #f9d976;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .player-badge {
            background: #0e1f30;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.9rem;
            display: inline-block;
        }
        .waiting-overlay {
            background: #0e1f30cc;
            border-radius: 30px;
            padding: 30px 20px;
            margin: 10px 0;
        }
        .online-status {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 4px;
        }
        @media (max-width: 550px) {
            .container { padding: 16px 12px; }
            .options-grid { grid-template-columns: 1fr; }
            .team-btn { min-width: 100px; padding: 12px 20px; font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ TUG OF WAR</h1>
        <div class="sub">🌐 live multiplayer · any device</div>
        
        <!-- Fixed PIN Display -->
        <div class="pin-display">🔑 55555</div>
        
        <!-- Team Selection -->
        <div class="team-select" id="teamSelect">
            <button class="team-btn" id="teamAbtn">🟦 Team A</button>
            <button class="team-btn" id="teamBbtn">🟥 Team B</button>
        </div>

        <!-- Game Area -->
        <div class="game-area" id="gameArea">
            <div class="team-row">
                <span class="team-name" id="teamAName">🟦 Team A</span>
                <span class="score" id="scoreA">0</span>
                <span style="font-size:1.8rem;">⚔️</span>
                <span class="score" id="scoreB">0</span>
                <span class="team-name" id="teamBName">🟥 Team B</span>
            </div>

            <div class="tug-canvas-wrap">
                <canvas id="tugCanvas" width="600" height="120"></canvas>
            </div>

            <div class="question-box" id="questionDisplay">Select your team to start!</div>

            <div class="options-grid" id="optionsContainer"></div>

            <div class="status-msg" id="statusMsg">
                <span class="spinner"></span> Connecting...
            </div>

            <div class="footer-btns">
                <button class="btn secondary" id="nextQuestionBtn" style="display:none;">⏩ Next Question</button>
                <button class="btn danger" id="resetBtn">🔄 Reset Game</button>
                <span class="player-badge" id="playerDisplay">👤 Team: —</span>
            </div>
            <div class="online-status" id="onlineStatus">🔴 Disconnected</div>
        </div>
    </div>

    <script>
        // ============================================
        // 🔥 FIREBASE CONFIGURATION
        // You MUST replace this with YOUR Firebase config
        // Go to: https://console.firebase.google.com
        // ============================================
        const firebaseConfig = {
  apiKey: "AIzaSyAFHRCadWPB0O-ucYg8OFLato0pfuJfxSU",
  authDomain: "tug-game.firebaseapp.com",
  databaseURL: "https://tug-game-default-rtdb.firebaseio.com",
  projectId: "tug-game",
  storageBucket: "tug-game.firebasestorage.app",
  messagingSenderId: "431145733371",
  appId: "1:431145733371:web:d3a00ea82b75393d57b45e"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ============================================
        // SAMPLE QUESTIONS (20+)
        // ============================================
        const SAMPLE_QUESTIONS = [
            { q: "What is the capital of France?", options: ["Paris", "London", "Berlin", "Madrid"], correct: 0 },
            { q: "Which planet is known as the Red Planet?", options: ["Venus", "Mars", "Jupiter", "Saturn"], correct: 1 },
            { q: "What is 7 × 8?", options: ["48", "56", "64", "72"], correct: 1 },
            { q: "Who painted the Mona Lisa?", options: ["Michelangelo", "Leonardo da Vinci", "Raphael", "Donatello"], correct: 1 },
            { q: "What is the smallest prime number?", options: ["0", "1", "2", "3"], correct: 2 },
            { q: "Which ocean is the largest?", options: ["Atlantic", "Indian", "Arctic", "Pacific"], correct: 3 },
            { q: "What is the chemical symbol for water?", options: ["H2O", "CO2", "NaCl", "HCl"], correct: 0 },
            { q: "Who wrote 'Hamlet'?", options: ["Shakespeare", "Dickens", "Hemingway", "Tolkien"], correct: 0 },
            { q: "What is the speed of light approx? (km/s)", options: ["300,000", "150,000", "500,000", "1,000,000"], correct: 0 },
            { q: "Which country has the most people?", options: ["India", "China", "USA", "Indonesia"], correct: 0 },
            { q: "What is the freezing point of water in Celsius?", options: ["0", "32", "100", "-1"], correct: 0 },
            { q: "Which animal is the fastest on land?", options: ["Lion", "Cheetah", "Horse", "Gazelle"], correct: 1 },
            { q: "What is the square root of 144?", options: ["10", "11", "12", "13"], correct: 2 },
            { q: "Which gas do plants absorb?", options: ["Oxygen", "Nitrogen", "Carbon Dioxide", "Hydrogen"], correct: 2 },
            { q: "What is the longest river in the world?", options: ["Nile", "Amazon", "Yangtze", "Mississippi"], correct: 0 },
            { q: "How many continents are there?", options: ["5", "6", "7", "8"], correct: 2 },
            { q: "Which element has the symbol 'Au'?", options: ["Silver", "Gold", "Iron", "Copper"], correct: 1 },
            { q: "What year did WWII end?", options: ["1944", "1945", "1946", "1947"], correct: 1 },
            { q: "Which is the smallest country?", options: ["Monaco", "Vatican", "San Marino", "Liechtenstein"], correct: 1 },
            { q: "What is the main ingredient in guacamole?", options: ["Tomato", "Avocado", "Onion", "Pepper"], correct: 1 },
            { q: "How many teeth does an adult human have?", options: ["28", "30", "32", "34"], correct: 2 },
            { q: "Which blood type is the rarest?", options: ["AB negative", "A positive", "B negative", "O positive"], correct: 0 },
        ];

        // ============================================
        // GAME STATE
        // ============================================
        const state = {
            playerId: null, // 'A' or 'B'
            questions: [],
            scoreA: 0,
            scoreB: 0,
            tugProgress: 50,
            teamA_questionIdx: 0,
            teamB_questionIdx: 0,
            answering: false,
            gameStarted: false,
            connected: false,
            listeners: {}
        };

        // ============================================
        // DOM REFS
        // ============================================
        const $ = id => document.getElementById(id);
        const teamAbtn = $('teamAbtn');
        const teamBbtn = $('teamBbtn');
        const teamSelect = $('teamSelect');
        const gameArea = $('gameArea');
        const teamAName = $('teamAName');
        const teamBName = $('teamBName');
        const scoreA = $('scoreA');
        const scoreB = $('scoreB');
        const tugCanvas = $('tugCanvas');
        const ctx = tugCanvas.getContext('2d');
        const questionDisplay = $('questionDisplay');
        const optionsContainer = $('optionsContainer');
        const statusMsg = $('statusMsg');
        const nextQuestionBtn = $('nextQuestionBtn');
        const resetBtn = $('resetBtn');
        const playerDisplay = $('playerDisplay');
        const onlineStatus = $('onlineStatus');

        // ============================================
        // CANVAS DRAWING
        // ============================================
        function drawTug(progress) {
            const w = tugCanvas.width, h = tugCanvas.height;
            ctx.clearRect(0, 0, w, h);
            const grad = ctx.createLinearGradient(0, 0, w, 0);
            grad.addColorStop(0, '#2a6f8f');
            grad.addColorStop(0.5, '#4a8aaa');
            grad.addColorStop(1, '#2a6f8f');
            ctx.fillStyle = grad;
            ctx.beginPath();
            ctx.roundRect(10, 30, w-20, 50, 25);
            ctx.fill();

            const ropeX = 10 + (progress / 100) * (w - 20 - 40);
            ctx.fillStyle = '#c9a87c';
            ctx.beginPath();
            ctx.roundRect(ropeX, 30, 40, 50, 12);
            ctx.fill();
            ctx.fillStyle = '#8b6b40';
            ctx.font = 'bold 28px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('⚡', ropeX+20, 55);

            ctx.font = 'bold 16px sans-serif';
            ctx.fillStyle = '#fff';
            ctx.textAlign = 'left';
            ctx.fillText('A', 20, 110);
            ctx.textAlign = 'right';
            ctx.fillText('B', w-20, 110);

            ctx.fillStyle = '#ffffff66';
            for (let i = 0; i <= 10; i++) {
                const x = 10 + (i / 10) * (w - 20);
                ctx.fillRect(x-1, 20, 2, 12);
            }
        }

        if (!CanvasRenderingContext2D.prototype.roundRect) {
            CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
                if (r > w/2) r = w/2;
                if (r > h/2) r = h/2;
                this.moveTo(x+r, y);
                this.lineTo(x+w-r, y);
                this.quadraticCurveTo(x+w, y, x+w, y+r);
                this.lineTo(x+w, y+h-r);
                this.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
                this.lineTo(x+r, y+h);
                this.quadraticCurveTo(x, y+h, x, y+r);
                this.lineTo(x, y+r);
                this.quadraticCurveTo(x, y, x+r, y);
                this.closePath();
                return this;
            };
        }

        // ============================================
        // UPDATE UI
        // ============================================
        function updateUI() {
            scoreA.textContent = state.scoreA;
            scoreB.textContent = state.scoreB;
            drawTug(state.tugProgress);
            
            if (state.playerId === 'A') {
                teamAName.textContent = '🟦 You (A)';
                teamBName.textContent = '🟥 Opponent (B)';
                playerDisplay.textContent = '👤 Team: A';
                teamAbtn.classList.add('selected');
                teamBbtn.classList.remove('selected');
            } else if (state.playerId === 'B') {
                teamAName.textContent = '🟦 Opponent (A)';
                teamBName.textContent = '🟥 You (B)';
                playerDisplay.textContent = '👤 Team: B';
                teamBbtn.classList.add('selected');
                teamAbtn.classList.remove('selected');
            } else {
                teamAName.textContent = '🟦 Team A';
                teamBName.textContent = '🟥 Team B';
                playerDisplay.textContent = '👤 Team: —';
                teamAbtn.classList.remove('selected');
                teamBbtn.classList.remove('selected');
            }
        }

        function animateScore(team) {
            const el = team === 'A' ? scoreA : scoreB;
            el.classList.remove('pop');
            void el.offsetWidth;
            el.classList.add('pop');
        }

        // ============================================
        // SHOW QUESTION
        // ============================================
        function showQuestionForPlayer() {
            const pid = state.playerId;
            if (!pid || !state.gameStarted) {
                questionDisplay.textContent = pid ? '⏳ Waiting for opponent...' : 'Select your team to start!';
                optionsContainer.innerHTML = '';
                return;
            }
            
            const idx = (pid === 'A') ? state.teamA_questionIdx : state.teamB_questionIdx;
            if (idx >= state.questions.length) {
                questionDisplay.textContent = '🏆 All questions answered!';
                optionsContainer.innerHTML = '';
                statusMsg.innerHTML = '🎉 Game over! Check scores.';
                return;
            }
            
            const qData = state.questions[idx];
            questionDisplay.textContent = qData.q;
            optionsContainer.innerHTML = '';
            qData.options.forEach((opt, i) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.dataset.index = i;
                btn.addEventListener('click', () => handleOptionClick(i));
                optionsContainer.appendChild(btn);
            });
            statusMsg.innerHTML = '📝 Choose your answer!';
            state.answering = false;
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = false);
            nextQuestionBtn.style.display = 'none';
        }

        // ============================================
        // HANDLE ANSWER
        // ============================================
        function handleOptionClick(selectedIdx) {
            if (state.answering || !state.playerId || !state.gameStarted) return;
            const pid = state.playerId;
            
            const idx = (pid === 'A') ? state.teamA_questionIdx : state.teamB_questionIdx;
            if (idx >= state.questions.length) return;
            
            const qData = state.questions[idx];
            const isCorrect = (selectedIdx === qData.correct);
            state.answering = true;

            const btns = document.querySelectorAll('.option-btn');
            btns.forEach((b, i) => {
                b.disabled = true;
                if (i === qData.correct) b.classList.add('correct');
                else if (i === selectedIdx && !isCorrect) b.classList.add('wrong');
            });

            if (isCorrect) {
                statusMsg.innerHTML = '✅ Correct! Pulling the rope!';
                if (pid === 'A') {
                    state.scoreA += 1;
                    state.tugProgress = Math.min(100, state.tugProgress + 2);
                    state.teamA_questionIdx += 1;
                    animateScore('A');
                } else {
                    state.scoreB += 1;
                    state.tugProgress = Math.max(0, state.tugProgress - 2);
                    state.teamB_questionIdx += 1;
                    animateScore('B');
                }
                updateUI();
                saveGameState();
                nextQuestionBtn.style.display = 'inline-block';
                
                const nextIdx = (pid === 'A') ? state.teamA_questionIdx : state.teamB_questionIdx;
                if (nextIdx >= state.questions.length) {
                    statusMsg.innerHTML = `🎉 Team ${pid} completed all questions!`;
                }
            } else {
                statusMsg.innerHTML = '❌ Wrong answer. Try again!';
                setTimeout(() => {
                    if (state.gameStarted) {
                        document.querySelectorAll('.option-btn').forEach(b => {
                            b.disabled = false;
                            b.classList.remove('correct', 'wrong');
                        });
                        state.answering = false;
                        statusMsg.innerHTML = '📝 Try again!';
                    }
                }, 1200);
            }
            updateUI();
        }

        // ============================================
        // FIREBASE OPERATIONS
        // ============================================
        function saveGameState() {
            if (!state.pin) return;
            const gameRef = db.ref(`games/55555`);
            gameRef.update({
                scoreA: state.scoreA,
                scoreB: state.scoreB,
                tugProgress: state.tugProgress,
                teamA_questionIdx: state.teamA_questionIdx,
                teamB_questionIdx: state.teamB_questionIdx,
                lastUpdated: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function listenToGame() {
            const gameRef = db.ref(`games/55555`);
            
            if (state.listeners.game) {
                state.listeners.game();
            }
            
            state.listeners.game = gameRef.on('value', (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    // Game doesn't exist yet, create it
                    initializeGame();
                    return;
                }
                
                state.connected = true;
                onlineStatus.textContent = '🟢 Connected';
                onlineStatus.style.color = '#4caf84';
                
                // Update state from Firebase
                const oldScoreA = state.scoreA;
                const oldScoreB = state.scoreB;
                
                state.scoreA = data.scoreA || 0;
                state.scoreB = data.scoreB || 0;
                state.tugProgress = data.tugProgress || 50;
                state.teamA_questionIdx = data.teamA_questionIdx || 0;
                state.teamB_questionIdx = data.teamB_questionIdx || 0;
                state.questions = data.questions || SAMPLE_QUESTIONS;
                state.gameStarted = true;
                
                updateUI();
                
                // Animate scores if they changed
                if (state.scoreA !== oldScoreA) animateScore('A');
                if (state.scoreB !== oldScoreB) animateScore('B');
                
                showQuestionForPlayer();
                
                // Update team buttons based on who's taken
                if (data.players) {
                    if (data.players.A && data.players.B) {
                        statusMsg.innerHTML = '🎮 Both teams ready! Answer to pull!';
                    } else if (data.players.A) {
                        statusMsg.innerHTML = '⏳ Waiting for Team B to join...';
                    } else if (data.players.B) {
                        statusMsg.innerHTML = '⏳ Waiting for Team A to join...';
                    }
                }
            });
        }

        function initializeGame() {
            const gameRef = db.ref(`games/55555`);
            gameRef.set({
                players: { A: false, B: false },
                scoreA: 0,
                scoreB: 0,
                tugProgress: 50,
                teamA_questionIdx: 0,
                teamB_questionIdx: 0,
                questions: shuffleArray([...SAMPLE_QUESTIONS]),
                created: firebase.database.ServerValue.TIMESTAMP
            });
        }

        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        // ============================================
        // TEAM SELECTION
        // ============================================
        function selectTeam(team) {
            if (state.playerId === team) return;
            
            // Check if team is already taken in Firebase
            const gameRef = db.ref(`games/55555/players`);
            gameRef.once('value', (snapshot) => {
                const players = snapshot.val();
                if (players && players[team] === true) {
                    alert(`Team ${team} is already taken! Please choose the other team.`);
                    return;
                }
                
                // Assign team
                state.playerId = team;
                gameRef.update({ [team]: true });
                
                // Load or initialize game
                const gameDataRef = db.ref(`games/55555`);
                gameDataRef.once('value', (snap) => {
                    const data = snap.val();
                    if (data) {
                        state.scoreA = data.scoreA || 0;
                        state.scoreB = data.scoreB || 0;
                        state.tugProgress = data.tugProgress || 50;
                        state.teamA_questionIdx = data.teamA_questionIdx || 0;
                        state.teamB_questionIdx = data.teamB_questionIdx || 0;
                        state.questions = data.questions || SAMPLE_QUESTIONS;
                        state.gameStarted = true;
                    } else {
                        initializeGame();
                    }
                    
                    gameArea.classList.add('active');
                    updateUI();
                    showQuestionForPlayer();
                    statusMsg.innerHTML = `🎮 You are Team ${team}! Answer to pull the rope!`;
                    saveGameState();
                });
            });
        }

        // ============================================
        // RESET GAME
        // ============================================
        function resetGame() {
            if (confirm('Reset the game for everyone?')) {
                const gameRef = db.ref(`games/55555`);
                gameRef.remove().then(() => {
                    state.playerId = null;
                    state.scoreA = 0;
                    state.scoreB = 0;
                    state.tugProgress = 50;
                    state.teamA_questionIdx = 0;
                    state.teamB_questionIdx = 0;
                    state.questions = shuffleArray([...SAMPLE_QUESTIONS]);
                    state.gameStarted = false;
                    state.answering = false;
                    
                    gameArea.classList.remove('active');
                    updateUI();
                    questionDisplay.textContent = 'Select your team to start!';
                    optionsContainer.innerHTML = '';
                    statusMsg.innerHTML = '👉 Choose Team A or B above';
                    nextQuestionBtn.style.display = 'none';
                    teamAbtn.classList.remove('selected');
                    teamBbtn.classList.remove('selected');
                    
                    initializeGame();
                });
            }
        }

        function advanceToNextQuestion() {
            showQuestionForPlayer();
            nextQuestionBtn.style.display = 'none';
            if (state.teamA_questionIdx >= state.questions.length && state.teamB_questionIdx >= state.questions.length) {
                statusMsg.innerHTML = '🏁 Both teams finished! Final scores.';
            }
        }

        // ============================================
        // CONNECTION STATUS
        // ============================================
        function checkConnection() {
            const connectedRef = db.ref('.info/connected');
            connectedRef.on('value', (snap) => {
                if (snap.val() === true) {
                    state.connected = true;
                    onlineStatus.textContent = '🟢 Connected';
                    onlineStatus.style.color = '#4caf84';
                } else {
                    state.connected = false;
                    onlineStatus.textContent = '🔴 Disconnected';
                    onlineStatus.style.color = '#c94a4a';
                    statusMsg.innerHTML = '<span class="spinner"></span> Reconnecting...';
                }
            });
        }

        // ============================================
        // EVENT LISTENERS
        // ============================================
        teamAbtn.addEventListener('click', () => selectTeam('A'));
        teamBbtn.addEventListener('click', () => selectTeam('B'));
        resetBtn.addEventListener('click', resetGame);
        nextQuestionBtn.addEventListener('click', advanceToNextQuestion);

        // ============================================
        // INIT
        // ============================================
        drawTug(50);
        checkConnection();
        listenToGame();
        
        console.log('🎮 Tug of War loaded! PIN: 55555');
        console.log('📌 Share this page with friends on any device!');
        console.log('⚠️ Make sure to replace firebaseConfig with YOUR Firebase config!');
    </script>
</body>
</html>
